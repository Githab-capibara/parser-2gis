name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build

    runs-on: ubuntu-22.04

    steps:
    - name: Get the version
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      shell: bash

    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.3"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .[dev]

    - name: Build standalone app
      run: |
        python setup.py build_standalone

    - name: Archive Linux distributive
      run: tar -C dist/ -czvf Parser2GIS-${{steps.get_version.outputs.version}}-linux.tar.gz Parser2GIS
      shell: bash

    - name: Upload distributive
      uses: actions/upload-artifact@v4
      with:
        name: dist-linux
        path: Parser2GIS-*
        retention-days: 5

  release:
    name: Release

    needs: [build]

    runs-on: ubuntu-latest

    steps:
    - name: Get the version
      id: get_version
      run: |
        echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      shell: bash

    - uses: actions/checkout@v4

    - name: Get Changelog Entry
      id: changelog_reader
      uses: mindsers/changelog-reader-action@v2
      with:
        version: ${{ steps.get_version.outputs.version }}
        path: ./CHANGELOG.md

    - uses: actions/download-artifact@v4

    - uses: ncipollo/release-action@v1.10.0
      with:
        tag: v${{ steps.changelog_reader.outputs.version }}
        name: Parser2GIS ${{ steps.changelog_reader.outputs.version }}
        body: ${{ steps.changelog_reader.outputs.changes }}
        prerelease: ${{ steps.changelog_reader.outputs.status == 'prereleased' }}
        draft: true
        artifacts: "dist-*/*"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
