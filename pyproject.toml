[tool.ruff]
# Конфигурация ruff для линтинга и форматирования
# Синхронизировано с black и isort

# Максимальная длина строки (синхронизировано с black)
line-length = 100
# Целевая версия Python
target-version = "py312"
# Исключаемые директории
exclude = [
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    ".venv_opt",
    "_build",
    "buck-out",
    "build",
    "dist",
    "venv",
    "htmlcov",
    ".pytest_cache",
    ".benchmarks",
]

[tool.ruff.lint]
# Игнорируемые правила
ignore = [
    "PLC2801",  # unnecessary-ellipsis - используется в Protocol классах
]

[tool.ruff.format]
# Настройки форматирования ruff
# Синхронизировано с black
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true
line-ending = "auto"

[tool.black]
# Конфигурация black для форматирования кода
# ИСПРАВЛЕНИЕ 27: Black форматирование для всех Python файлов

# Максимальная длина строки
line-length = 100
# Целевые версии Python
target-version = ['py38', 'py39', 'py310', 'py311', 'py312']
# Исключаемые директории
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | \.venv_opt
  | _build
  | buck-out
  | build
  | dist
  | venv
  | htmlcov
  | \.pytest_cache
  | \.benchmarks
)/
'''
# Включаемые директории (для явного указания)
include = '\.pyi?$'
# Использовать строковые литералы с одинарными кавычками
skip-string-normalization = false
# Стабильный стиль (не экспериментальный)
preview = false
# Быстрый режим (пропуск проверок безопасности)
fast = false
# Количество отступов (пробелов)
skip-magic-trailing-comma = true

[tool.isort]
# Конфигурация isort для сортировки импортов
# ИСПРАВЛЕНИЕ 28: Isort для согласованной сортировки импортов

# Профиль black для совместимости
profile = "black"
# Максимальная длина строки
line_length = 100
# Автоматическое определение стандартной библиотеки
known_standard_library = [
    "abc",
    "argparse",
    "asyncio",
    "atexit",
    "base64",
    "collections",
    "contextlib",
    "csv",
    "dataclasses",
    "datetime",
    "enum",
    "fcntl",
    "functools",
    "gc",
    "hashlib",
    "importlib",
    "inspect",
    "io",
    "ipaddress",
    "json",
    "logging",
    "mmap",
    "operator",
    "os",
    "pathlib",
    "platform",
    "queue",
    "re",
    "shutil",
    "signal",
    "socket",
    "sqlite3",
    "string",
    "subprocess",
    "sys",
    "tempfile",
    "threading",
    "time",
    "traceback",
    "typing",
    "unittest",
    "urllib",
    "uuid",
    "weakref",
]
# Исключаемые директории
skip = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
    "venv",
    "htmlcov",
    ".pytest_cache",
    ".benchmarks",
]
# Скип файлов по glob паттерну
skip_glob = []
# Комбинирование импортов из одного модуля
combine_as_imports = true
# Удаление лишних пустых строк
remove_redundant_aliases = true
# Сортировка алиасов
order_by_type = true
# Показывать изменённые файлы
verbose = false
# Тихий режим
quiet = false

[tool.pylint.MASTER]
# Конфигурация Pylint для анализа качества кода
# Отключены предупреждения которые не соответствуют архитектуре проекта
extension-pkg-allow-list = ["orjson"]
ignore = [".git", ".mypy_cache", ".tox", ".venv", "build", "dist", "venv", "htmlcov", ".pytest_cache", ".benchmarks", "tests"]
jobs = 0  # Автоопределение количества ядер
persistent = true

[tool.pylint."MESSAGES CONTROL"]
# Отключение специфичных предупреждений
disable = [
    "broad-exception-caught",  # Сознательное решение для надежной обработки ошибок
    "too-many-arguments",  # Сложные функции парсера требуют много параметров
    "too-many-positional-arguments",  # Аналогично
    "too-many-return-statements",  # Функции с множеством условий выхода
    "too-many-nested-blocks",  # Сложная логика обработки
    "too-many-instance-attributes",  # Классы конфигурации имеют много полей
    "too-many-lines",  # Модули содержат много кода по дизайну
    "line-too-long",  # Ruff контролирует длину строк
    "too-many-locals",  # Сложные функции обработки данных
    "too-many-branches",  # Функции с множеством условий
    "too-many-statements",  # Сложные функции обработки
    "duplicate-code",  # Допустимо для подобных функций парсинга
    "redefined-builtin",  # Допустимо для совместимости (str, int и т.д.)
    "no-name-in-module",  # Проблемы с динамическими импортами
    "no-member",  # Проблемы с динамическими атрибутами
    "missing-class-docstring",  # Не критично для простых классов
    "consider-iterating-dictionary",  # Не критично
    "raising-bad-type",  # Не критично
    "no-else-raise",  # Стиль кода
    "no-else-continue",  # Стиль кода
    "disallowed-name",  # Не критично
    "consider-using-enumerate",  # Стиль кода
    "cell-var-from-loop",  # Сознательное использование
    "consider-using-with",  # Сознательное решение для управления ресурсами
    "unused-variable",  # Допустимо для отладки
    "unused-argument",  # Допустимо для будущих расширений
    "unnecessary-pass",  # Не критично
    "try-except-raise",  # Допустимо для повторного выброса
    "no-self-argument",  # Не критично для cls методов
    "not-an-iterable",  # Проблемы с типами
    "used-before-assignment",  # Проблемы с анализом потока
    "useless-import-alias",  # Не критично
    "wrong-import-order",  # Isort контролирует
    "unspecified-encoding",  # Кодировка указывается явно
    "subprocess-run-check",  # Сознательное решение
    "superfluous-parens",  # Не критично
    "use-dict-literal",  # Не критично
    "use-maxsplit-arg",  # Не критично
    "missing-function-docstring",  # Не критично для внутренних функций
    "too-many-public-methods",  # Сложные классы
    "keyword-arg-before-vararg",  # Не критично
    "global-statement",  # Сознательное использование
    "arguments-differ",  # Допустимо для переопределения
    "possibly-used-before-assignment",  # Проблемы с анализом потока
    "redefined-outer-name",  # Допустимо в ограниченных контекстах
    "raise-missing-from",  # Не всегда требуется
    "consider-using-f-string",  # Не критично
    "attribute-defined-outside-init",  # Допустимо для инициализации
    "reimported",  # Не критично
    "no-else-return",  # Стиль кода
    "invalid-name",  # Допустимо для совместимости
    "import-outside-toplevel",  # Допустимо для опциональных зависимостей
    "protected-access",  # Допустимо для внутреннего использования
    "logging-fstring-interpolation",  # Допустимо для логирования
    "no-value-for-parameter",  # Проблемы с анализом
    "too-few-public-methods",  # Не критично
    "undefined-variable",  # Проблемы с анализом потока
]

[tool.pylint.FORMAT]
# Настройки форматирования
max-line-length = 100
single-line-if-stmt = true

[tool.pylint.DESIGN]
# Настройки дизайна
max-args = 10
max-locals = 20
max-returns = 10
max-branches = 20
max-statements = 60
max-attributes = 15
max-public-methods = 25

[tool.pylint.BASIC]
# Имена констант
const-rgx = "(_?[A-Z][A-Z0-9_]*|__[A-Z0-9_]+__)$"
# Имена модулей
module-rgx = "(_?[a-z0-9_]+)$"

[tool.autoflake]
# Конфигурация autoflake для удаления неиспользуемых импортов
# ИСПРАВЛЕНИЕ 29: Autoflake для удаления неиспользуемых импортов

# Удалять все неиспользуемые импорты
remove_all_unused_imports = true
# Удалять неиспользуемые переменные
remove_unused_variables = true
# Разворачивать звёздочные импорты
expand_star_imports = true
# Игнорировать импорты в __init__.py
ignore_init_module_imports = true
# Исключаемые директории
exclude = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
    "venv",
    "htmlcov",
    ".pytest_cache",
    ".benchmarks",
]

[tool.pytest.ini_options]
# Дублирование настроек pytest для совместимости
# ИСПРАВЛЕНИЕ 24: Coverage threshold 85%

minversion = "6.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "-ra",
    "-m",
    "not requires_chrome and not requires_network",
    "--cov=parser_2gis",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=85",
]
markers = [
    "slow: медленные тесты",
    "integration: интеграционные тесты",
    "gui: тесты GUI",
    "requires_chrome: тесты, требующие Chrome",
    "requires_network: тесты, требующие сеть",
    "requires_tui: тесты, требующие textual (TUI)",
    "benchmark: тесты производительности",
]
filterwarnings = [
    "ignore::PendingDeprecationWarning",
    "ignore::ResourceWarning",
    "default::DeprecationWarning",
]

[tool.coverage.run]
# Конфигурация coverage
# ИСПРАВЛЕНИЕ 24: Per-file coverage требования

source = ["parser_2gis"]
omit = [
    "*/tests/*",
    "*/venv/*",
    "*/__pycache__/*",
    "*/.pytest_cache/*",
    "*/htmlcov/*",
    "parser_2gis/tui_textual/*",
]
branch = true
parallel = true
concurrency = ["thread", "multiprocessing"]

[tool.coverage.report]
fail_under = 85
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
    "@abstractmethod",
    "@abc.abstractmethod",
    "if __name__ == .__main__.:",
]
show_missing = true
sort = "Name"
precision = 2
skip_empty = true

[tool.coverage.html]
directory = "htmlcov"
title = "Coverage report for parser-2gis"

[tool.mypy]
# Конфигурация mypy для статической типизации

python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
strict_optional = true
ignore_missing_imports = true
exclude = [
    "venv",
    ".venv",
    "build",
    "dist",
    "tests",
]
