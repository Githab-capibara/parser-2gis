[tool.black]
# Конфигурация black для форматирования кода
# ИСПРАВЛЕНИЕ 27: Black форматирование для всех Python файлов

# Максимальная длина строки
line-length = 100
# Целевые версии Python
target-version = ['py38', 'py39', 'py310', 'py311', 'py312']
# Исключаемые директории
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | venv
  | htmlcov
  | \.pytest_cache
  | \.benchmarks
)/
'''
# Включаемые директории (для явного указания)
include = '\.pyi?$'
# Использовать строковые литералы с одинарными кавычками
skip-string-normalization = false
# Стабильный стиль (не экспериментальный)
preview = false
# Быстрый режим (пропуск проверок безопасности)
fast = false
# Количество отступов (пробелов)
skip-magic-trailing-comma = false

[tool.isort]
# Конфигурация isort для сортировки импортов
# ИСПРАВЛЕНИЕ 28: Isort для согласованной сортировки импортов

# Профиль black для совместимости
profile = "black"
# Максимальная длина строки
line_length = 100
# Длина отступа
indent = 4
# Сортировка импортов по типу
force_sort_within_sections = true
# Группировка импортов
force_grid_wrap = 0
# Использовать скобки для длинных импортов
multi_line_output = 3
# Включаем скобки для импортов
include_trailing_comma = true
# Длина строки для обёртывания
lines_after_imports = 2
# Разделитель импортов первого лица
known_first_party = ["parser_2gis", "tests"]
# Секции импортов
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
# Автоматическое определение стандартной библиотеки
known_standard_library = [
    "abc",
    "argparse",
    "asyncio",
    "atexit",
    "base64",
    "collections",
    "contextlib",
    "csv",
    "dataclasses",
    "datetime",
    "enum",
    "fcntl",
    "functools",
    "gc",
    "hashlib",
    "importlib",
    "inspect",
    "io",
    "ipaddress",
    "json",
    "logging",
    "mmap",
    "operator",
    "os",
    "pathlib",
    "platform",
    "queue",
    "queue",
    "re",
    "shutil",
    "signal",
    "socket",
    "sqlite3",
    "string",
    "subprocess",
    "sys",
    "tempfile",
    "threading",
    "time",
    "traceback",
    "typing",
    "unittest",
    "urllib",
    "uuid",
    "weakref",
]
# Исключаемые директории
skip = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
    "venv",
    "htmlcov",
    ".pytest_cache",
    ".benchmarks",
]
# Скип файлов по glob паттерну
skip_glob = []
# Комбинирование импортов из одного модуля
combine_as_imports = true
# Удаление лишних пустых строк
remove_redundant_aliases = true
# Сортировка алиасов
order_by_type = true
# Группировка импортов с будущим
future = true
# Показывать изменённые файлы
verbose = false
# Показывать логи
show_logs = false
# Проверка только (без записи)
check_only = false
# Тихий режим
quiet = false
# Очень тихий режим
silent = false

[tool.autoflake]
# Конфигурация autoflake для удаления неиспользуемых импортов
# ИСПРАВЛЕНИЕ 29: Autoflake для удаления неиспользуемых импортов

# Удалять все неиспользуемые импорты
remove_all_unused_imports = true
# Удалять неиспользуемые переменные
remove_unused_variables = true
# Разворачивать звёздочные импорты
expand_star_imports = true
# Игнорировать импорты в __init__.py
ignore_init_module_imports = true
# Исключаемые директории
exclude = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
    "venv",
    "htmlcov",
    ".pytest_cache",
    ".benchmarks",
]

[tool.pytest.ini_options]
# Дублирование настроек pytest для совместимости
# ИСПРАВЛЕНИЕ 24: Coverage threshold 85%

minversion = "6.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "-ra",
    "-m",
    "not requires_chrome and not requires_network",
    "--cov=parser_2gis",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=85",
]
markers = [
    "slow: медленные тесты",
    "integration: интеграционные тесты",
    "gui: тесты GUI",
    "requires_chrome: тесты, требующие Chrome",
    "requires_network: тесты, требующие сеть",
    "requires_tui: тесты, требующие textual (TUI)",
    "benchmark: тесты производительности",
]
filterwarnings = [
    "ignore::PendingDeprecationWarning",
    "ignore::ResourceWarning",
    "default::DeprecationWarning",
]

[tool.coverage.run]
# Конфигурация coverage
# ИСПРАВЛЕНИЕ 24: Per-file coverage требования

source = ["parser_2gis"]
omit = [
    "*/tests/*",
    "*/venv/*",
    "*/__pycache__/*",
    "*/.pytest_cache/*",
    "*/htmlcov/*",
    "parser_2gis/tui_textual/*",
]
branch = true
parallel = true
concurrency = ["thread", "multiprocessing"]

[tool.coverage.report]
fail_under = 85
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
    "@abstractmethod",
    "@abc.abstractmethod",
    "if __name__ == .__main__.:",
]
show_missing = true
sort = "Name"
precision = 2
skip_empty = true

[tool.coverage.html]
directory = "htmlcov"
title = "Coverage report for parser-2gis"

[tool.mypy]
# Конфигурация mypy для статической типизации

python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
strict_optional = true
ignore_missing_imports = true
exclude = [
    "venv",
    ".venv",
    "build",
    "dist",
    "tests",
]
