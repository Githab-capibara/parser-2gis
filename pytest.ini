# Конфигурация pytest для тестов парсера 2GIS

[pytest]
# Директория с тестами
testpaths = testes

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Параметры по умолчанию
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Маркеры
markers =
    slow: медленные тесты
    integration: интеграционные тесты
    gui: тесты GUI
    requires_chrome: тесты, требующие Chrome
    requires_network: тесты, требующие сеть

# Настройки логирования
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Настройки кэширования
cache_dir = .pytest_cache

# Фильтры предупреждений
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Таймаут для тестов (в секундах)
# Примечание: для использования таймаута требуется плагин pytest-timeout.
# Установите его (pip install pytest-timeout) и раскомментируйте следующую строку,
# либо добавьте "--timeout=300" в addopts.
# timeout = 300

# Параллельное выполнение (если установлен pytest-xdist)
# numprocesses = auto
