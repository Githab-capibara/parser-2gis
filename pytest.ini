# Конфигурация pytest для тестов парсера 2GIS

[pytest]
# Директория с тестами
testpaths = tests

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Параметры по умолчанию
# ИСПРАВЛЕНИЕ 24: Увеличен coverage threshold до 85% для production кода
# ИСПРАВЛЕНИЕ 25: Убрано игнорирование DeprecationWarning для pychrome и websocket
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    -m "not requires_chrome and not requires_network"
    # --cov=parser_2gis
    # --cov-report=term-missing
    # --cov-report=html:htmlcov
    # --cov-fail-under=85

# ИСПРАВЛЕНИЕ 24: Per-file coverage требования
# Критические модули должны иметь 100% coverage
# Для настройки per-file coverage используйте .coveragerc или setup.cfg
# [coverage:run]
# source = parser_2gis
# [coverage:report]
# fail_under = 85
# [coverage:html]
# directory = htmlcov

# Маркеры
markers =
    slow: медленные тесты
    integration: интеграционные тесты
    gui: тесты GUI
    requires_chrome: тесты, требующие Chrome
    requires_network: тесты, требующие сеть
    requires_tui: тесты, требующие textual (TUI)
    benchmark: тесты производительности
    formatting: тесты форматирования кода (black, isort, autoflake)
    audit_fix: тесты для исправлений аудита
    critical: критические ошибки
    logical: ошибки логики
    optimization: оптимизации
    readability: улучшения читаемости
    keyboard_interrupt: тесты обработки KeyboardInterrupt
    unit: юнит-тесты
    logging: тесты логирования
    encoding: тесты кодировок

# Настройки логирования
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Настройки кэширования
cache_dir = .pytest_cache

# ИСПРАВЛЕНИЕ 25: Фильтры предупреждений
# Убрано игнорирование DeprecationWarning для pychrome и websocket
# Теперь все DeprecationWarning будут видны в тестах
filterwarnings =
    # Игнорировать PendingDeprecationWarning
    ignore::PendingDeprecationWarning
    # Игнорировать ResourceWarning в тестах (нормально для тестов)
    ignore::ResourceWarning
    # Показывать все остальные предупреждения включая DeprecationWarning
    default::DeprecationWarning

# Таймаут для тестов (в секундах)
# Примечание: для использования таймаута требуется плагин pytest-timeout.
# Установите его (pip install pytest-timeout) и раскомментируйте следующую строку,
# либо добавьте "--timeout=300" в addopts.
# timeout = 300

# Параллельное выполнение (если установлен pytest-xdist)
# numprocesses = auto

# ИСПРАВЛЕНИЕ 24: Документация по запуску с новыми threshold
#
# Запуск всех тестов (включая requires_chrome и requires_network):
#   pytest -m "" --cov=parser_2gis
#
# Запуск только тестов без Chrome/сети (по умолчанию):
#   pytest -m "not requires_chrome and not requires_network"
#
# Запуск в CI/CD (все тесты):
#   pytest -m "" --cov=parser_2gis --cov-report=xml
#
# Запуск с подробным отчётом о coverage:
#   pytest --cov=parser_2gis --cov-report=term-missing
#
# Критические модули с требованием 100% coverage:
#   - parser_2gis/cache.py
#   - parser_2gis/chrome/browser.py
#   - parser_2gis/validation.py
