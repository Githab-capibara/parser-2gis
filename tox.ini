[tox]
envlist = flake8, mypy, py38, py39, py310, py311
toxworkdir = {env:TOX_WORK_DIR:.tox}

[testenv]
deps =
  -e .[dev]
setenv = HOME = {envtmpdir}
commands =
  pytest -v

[testenv:flake8]
deps =
  flake8>=3.8.4,<4.1
commands =
  flake8 parser_2gis

[testenv:mypy]
deps =
  mypy==0.950
  types-requests==2.27.25

commands =
  mypy {posargs}
