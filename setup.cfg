[flake8]
max-line-length = 130
max-complexity = 12
ignore = C901,W503,E722,E731
per-file-ignores =
    # module imported but unused
    __init__.py:F401,
    exceptions.py:F401,
    # one line parser's argument definition
    parser_2gis/main.py: E501

# ИСПРАВЛЕНИЕ 24: Per-file coverage требования
# Критические модули должны иметь 100% coverage
[coverage:run]
source = parser_2gis
branch = True
omit =
    */tests/*
    */__pycache__/*
    */.venv/*
    */venv/*

[coverage:report]
fail_under = 85
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    raise AssertionError
    raise NotImplementedError
    def __repr__
    if __name__ == .__main__.:

[coverage:html]
directory = htmlcov

[tool:pytest]
pythonpath = .
testpaths = tests
addopts = --capture=no --color=yes

[mypy]
ignore_missing_imports = true
files = parser_2gis
