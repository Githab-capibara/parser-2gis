# ISSUE 013: max-line-length исправлен с 130 на 100 (синхронизировано с ruff/black)
[flake8]
max-line-length = 100
max-complexity = 12
ignore = C901,W503,E722,E731
per-file-ignores =
    # module imported but unused
    __init__.py:F401,
    exceptions.py:F401,
    # one line parser's argument definition
    parser_2gis/main.py: E501

# ISSUE 014: Дублирование pytest config — вся конфигурация в pyproject.toml
# ISSUE 015: Дублирование coverage config — вся конфигурация в pyproject.toml
# Этот файл оставлен только для flake8

[mypy]
ignore_missing_imports = true
files = parser_2gis
